name: Fetch F1 Data & Deploy

on:
  schedule:
    - cron: '0 23 * * 0'   # Sunday 23:00 UTC — catches most race results
    - cron: '0 6 * * 1'    # Monday 06:00 UTC — retry for late races (Miami/Austin/Mexico end ~22:00 UTC Sunday, after the first cron)
  push:
    branches: ['main']
  workflow_dispatch:         # Manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HAS_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Fetch F1 data from Jolpica API
        run: node scripts/fetch-f1-data.mjs
      - name: Fetch sector & speed data from OpenF1 API
        run: node scripts/fetch-openf1-data.mjs
      - uses: actions/setup-python@v5
        if: env.HAS_ANTHROPIC_KEY == 'true'
        with:
          python-version: '3.12'
      - name: Fetch driver quotes from YouTube
        if: env.HAS_ANTHROPIC_KEY == 'true'
        continue-on-error: true
        run: |
          pip install youtube-transcript-api anthropic requests
          python scripts/fetch-driver-quotes.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - id: deployment
        uses: actions/deploy-pages@v4
