name: Fetch F1 Data & Deploy

on:
  schedule:
    - cron: '0 23 * * 0'   # Every Sunday 5 PM CT
  push:
    branches: ['main']
  workflow_dispatch:         # Manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Fetch F1 data from Jolpica API
        run: node scripts/fetch-f1-data.mjs
      - name: Fetch sector & speed data from OpenF1 API
        run: node scripts/fetch-openf1-data.mjs
      - run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - id: deployment
        uses: actions/deploy-pages@v4
